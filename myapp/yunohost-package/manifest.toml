# Bu dosya YunoHost icin esp32-monitor uygulama paket manifest bilgisini tanimlar.
packaging_format = 2

id = "esp32-monitor"
name = "esp32-monitor"
description.en = "ESP32 sensor data collection, storage and LSTM prediction service"
description.tr = "ESP32 sensor veri toplama, saklama ve LSTM tahmin servisi"
version = "1.0.0~ynh1"
maintainers = ["Your Name"]

[upstream]
license = "MIT"
website = "https://github.com/yourname/esp32-monitor"

[integration]
yunohost = ">= 11.2"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = false
ldap = false
sso = false
disk = "500M"
ram.build = "1G"
ram.runtime = "512M"

[install]

[resources]

[resources.system_user]

[resources.install_dir]

[resources.permissions]
main.url = "/"
main.auth_header = false
main.show_tile = true

[resources.ports]
node_api.default = 3000
node_api.exposed = false
ml_service.default = 5000
ml_service.exposed = false

[resources.apt]
packages = "nodejs npm python3 python3-venv python3-pip mysql-server nginx"
